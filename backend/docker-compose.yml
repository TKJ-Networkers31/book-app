services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: booktracker_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d booktracker_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: lidevops/project-app:latest
    container_name: backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
