services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d booktracker_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: lidevops/project-app:latest
    container_name: backend
    restart: unless-stopped
    ports:
      - "${PORT_HOST}:${PORT_APP}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
